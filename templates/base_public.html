<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Placement Portal</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#dfe4ee;
    color:#172033;
}

.layout{
    display:flex;
}

/* ---------- Sidebar ---------- */

.sidebar{
    width:240px;
    height:100vh;
    position:fixed;
    left:0;
    top:0;
    background:#17233b;
    padding:20px;
    color:white;
}

.brand{
    font-size:28px;
    font-weight:800;
    margin-bottom:42px;
    line-height:1.2;
}

.nav-section-title{
    font-size:13px;
    color:#7b8ba7;
    text-transform:uppercase;
    letter-spacing:1px;
    margin-bottom:16px;
}

.nav-link{
    display:block;
    text-decoration:none;
    color:#d7e2f5;
    padding:14px 16px;
    border-radius:14px;
    margin-bottom:8px;
    transition:.25s;
    font-size:16px;
}

.nav-link:hover{
    background:#2c3850;
    color:white;
}

/* ---------- Main ---------- */

.main{
    margin-left:240px;
    width:calc(100% - 240px);
    min-height:100vh;
}

/* ---------- Topbar ---------- */

.topbar{
    background:#172129;
    display:flex;
    justify-content:flex-end;
    align-items:center;
    gap:16px;
    padding:18px 30px;
}

.topbar-user{
    color:white;
    font-size:16px;
    font-weight:700;
}

.topbar-badge{
    background:#8e98a3;
    color:white;
    padding:5px 12px;
    border-radius:10px;
    font-size:13px;
    font-weight:700;
}

.logout-btn{
    text-decoration:none;
    color:white;
    border:1px solid rgba(255,255,255,.65);
    border-radius:12px;
    padding:10px 18px;
    font-weight:700;
    transition:.2s;
}

.logout-btn:hover{
    background:white;
    color:#172129;
}

/* ---------- Page ---------- */

.page-content{
    padding:30px;
}

/* ---------- Public Pages ---------- */

.public-page{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* ---------- Responsive ---------- */

@media(max-width:860px){

.sidebar{
    width:100%;
    position:relative;
    height:auto;
}

.main{
    margin-left:0;
    width:100%;
}

.page-content{
    padding:20px;
}

.layout{
    display:block;
}

}
</style>

</head>

<body>

{% if page_type == 'dashboard' %}

<div class="layout">

    <aside class="sidebar">

        <div class="brand">
            Placement Portal
        </div>

        <div class="nav-section-title">
            Company Panel
        </div>

        <a class="nav-link" href="/company/dashboard">
            Dashboard
        </a>

        <a class="nav-link" href="/company/drive/create">
            Post Drive
        </a>

    </aside>

    <main class="main">

        <div class="topbar">

            <div class="topbar-user">
                {{ session.get('username') }}
            </div>

            <div class="topbar-badge">
                Company
            </div>

            <a class="logout-btn" href="/logout">
                Logout
            </a>

        </div>

        <div class="page-content">
            {{ self.content() }}
        </div>

    </main>

</div>

{% else %}

<div class="public-page">
    {{ self.content() }}
</div>

{% endif %}

</body>
</html>
