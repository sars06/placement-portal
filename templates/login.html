<!DOCTYPE html>
<html>
<head>
    <title>Login - Placement Portal</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #FAF9F6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-container {
            background: #1e293b;
            padding: 40px;
            border-radius: 12px;
            width: 400px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .login-container h2 {
            margin-bottom: 10px;
        }
        .login-container p {
            color: #94a3b8;
            margin-bottom: 25px;
        }
        label {
            font-size: 14px;
            color: #cbd5f5;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: none;
            background: #334155;
            color: white;
        }
        input:focus, select:focus {
            outline: none;
            background: #475569;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .btn:hover {
            background: #2563eb;
        }
        .links {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
            color: #94a3b8;
        }
        .links a {
            color: #3b82f6;
            text-decoration: none;
        }
        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="login-container">
    <h2>Placement Portal</h2>
    <p>Sign in to continue</p>
    <form method="POST">
        <label>Login As</label>
        <select name="role">
            <option value="admin">Admin</option>
            <option value="student">Student</option>
            <option value="company">Company</option>
        </select>
        <label>Username</label>
        <input type="text" name="username" required>
        <label>Password</label>
        <input type="password" name="password" required>
        <button class="btn">Sign In</button>
    </form>
    <div class="links">
        New here?
        <a href="/register/student">Student</a> |
        <a href="/register/company">Company</a>
    </div>
</div>
</body>
</html>
